<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CryptoSignal — 智能合约信号系统</title>
<style>
/* ============================================================
   CryptoSignal Dashboard — Dark Premium Theme v2.1
   ============================================================ */
:root {
  --bg: #0a0e17;
  --bg-card: rgba(15, 20, 35, 0.85);
  --bg-card-hover: rgba(20, 28, 48, 0.92);
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text: #e8ecf1;
  --text-dim: #98a2b3;
  --text-muted: #667085;
  --green: #00d4aa;
  --green-glow: rgba(0, 212, 170, 0.3);
  --red: #ff4757;
  --red-glow: rgba(255, 71, 87, 0.3);
  --yellow: #f9a825;
  --blue: #4dabf7;
  --purple: #9775fa;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(0, 212, 170, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 60%, rgba(77, 171, 247, 0.04) 0%, transparent 60%);
}

/* ============ Header ============ */
.header {
  padding: 28px 28px 0;
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 16px;
}
.header h1 {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.8px;
  background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 4px;
  font-weight: 500;
}
.status-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: var(--text-dim);
}
.status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px var(--green-glow);
  animation: pulse 2s infinite;
}
.status-dot.error { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}
.refresh-countdown {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

/* ============ Grid ============ */
.dashboard {
  max-width: 1400px;
  margin: 24px auto;
  padding: 0 28px 48px;
}

/* Coin Cards Grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
  gap: 20px;
  margin-bottom: 28px;
}

@media (max-width: 768px) {
  .card-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 24px; }
  .header { padding: 18px 16px 0; }
  .dashboard { padding: 16px 12px 36px; }
}

/* ============ Coin Card ============ */
.coin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.coin-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

/* Card gradient edge based on direction */
.coin-card.long::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green), transparent);
  border-radius: var(--radius) var(--radius) 0 0;
}
.coin-card.short::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--red), transparent);
  border-radius: var(--radius) var(--radius) 0 0;
}
.coin-card.wait::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--text-muted), transparent);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Card Header */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.coin-name {
  display: flex;
  align-items: center;
  gap: 12px;
}
.coin-icon {
  width: 40px; height: 40px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.coin-icon svg { display: block; }

.coin-symbol {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}
.coin-price {
  font-size: 26px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
  letter-spacing: -1px;
  line-height: 1.1;
}
.price-change {
  font-size: 13px;
  padding: 3px 10px;
  border-radius: 5px;
  font-weight: 700;
}
.price-change.up { color: var(--green); background: rgba(0, 212, 170, 0.12); }
.price-change.down { color: var(--red); background: rgba(255, 71, 87, 0.12); }

/* Signal Badge */
.signal-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  line-height: 1;
}
.signal-badge.long {
  background: rgba(0, 212, 170, 0.15);
  color: var(--green);
  box-shadow: 0 0 16px rgba(0, 212, 170, 0.15);
}
.signal-badge.short {
  background: rgba(255, 71, 87, 0.15);
  color: var(--red);
  box-shadow: 0 0 16px rgba(255, 71, 87, 0.15);
}
.signal-badge.wait {
  background: rgba(152, 162, 179, 0.12);
  color: var(--text-dim);
}

/* Score Gauge */
.score-section {
  display: flex;
  align-items: center;
  gap: 18px;
  margin: 14px 0;
}
.gauge {
  width: 84px; height: 84px;
  position: relative;
  flex-shrink: 0;
}
.gauge-svg { transform: rotate(-90deg); }
.gauge-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
.gauge-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease, stroke 0.5s ease; }
.gauge-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.gauge-value { font-size: 24px; font-weight: 800; line-height: 1; }
.gauge-label { font-size: 10px; color: var(--text-dim); margin-top: 3px; font-weight: 500; }

.score-meta {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}
.score-meta strong { color: var(--text); font-size: 14px; }

/* Indicators row */
.indicators {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.indicator {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}
.indicator .label { color: var(--text-dim); font-weight: 500; }
.indicator .value { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* Levels section */
.levels {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  font-size: 12px;
}
.level-item { display: flex; justify-content: space-between; align-items: center; }
.level-item .lbl { color: var(--text-muted); font-weight: 500; }
.level-item .val { font-weight: 700; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; font-family: var(--font-mono); font-size: 11px; }
.level-item.tp .val { color: var(--green); }
.level-item.sl .val { color: var(--red); }
.level-item.entry .val { color: var(--blue); }

/* ============ History Section ============ */
.section-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::before {
  content: '';
  width: 4px; height: 18px;
  background: var(--green);
  border-radius: 2px;
}

.history-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.history-list { max-height: 360px; overflow-y: auto; }
.history-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.history-item:last-child { border-bottom: none; }
.history-time { color: var(--text-muted); font-size: 12px; width: 52px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.history-sym { font-weight: 800; width: 40px; flex-shrink: 0; font-size: 14px; }
.history-dir {
  padding: 3px 12px; border-radius: 12px;
  font-size: 12px; font-weight: 700;
}
.history-dir.long { background: rgba(0, 212, 170, 0.15); color: var(--green); }
.history-dir.short { background: rgba(255, 71, 87, 0.15); color: var(--red); }
.history-score { font-weight: 800; width: 48px; text-align: right; flex-shrink: 0; font-size: 14px; }
.history-price { color: var(--text-dim); flex-shrink: 0; font-size: 13px; font-variant-numeric: tabular-nums; }
.history-ch { font-size: 11px; color: var(--text-muted); margin-left: auto; }

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
.empty-state .msg { font-size: 14px; }
.empty-state .hint { font-size: 12px; margin-top: 6px; color: var(--text-muted); }

/* ============ Footer ============ */
.footer {
  text-align: center;
  padding: 28px;
  color: var(--text-muted);
  font-size: 12px;
}
.footer a { color: var(--text-dim); text-decoration: none; font-weight: 500; }
.footer a:hover { color: var(--green); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* Animation */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
.coin-card { animation: fadeInUp 0.45s ease both; }
.coin-card:nth-child(1) { animation-delay: 0s; }
.coin-card:nth-child(2) { animation-delay: 0.08s; }
.coin-card:nth-child(3) { animation-delay: 0.16s; }
.coin-card:nth-child(4) { animation-delay: 0.24s; }

/* Mobile tweak */
@media (max-width: 480px) {
  .coin-card { padding: 18px; }
  .gauge { width: 70px; height: 70px; }
  .gauge-value { font-size: 20px; }
  .coin-price { font-size: 22px; }
  .coin-icon { width: 36px; height: 36px; }
  .coin-icon svg { width: 36px; height: 36px; }
  .indicators { grid-template-columns: 1fr; }
  .signal-badge { font-size: 12px; padding: 4px 12px; }
  .score-section { gap: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>CryptoSignal</h1>
    <div class="subtitle">六因子保守策略 · 智能合约信号系统</div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">连接中...</span>
    <span class="refresh-countdown" id="countdown"></span>
  </div>
</div>

<div class="dashboard">
  <!-- Coin Cards -->
  <div class="card-grid" id="cardGrid"></div>

  <!-- History Panel -->
  <div class="history-panel">
    <div class="section-title">信号历史</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="footer">
  CryptoSignal v2.1 · 信号仅供参考，不构成投资建议 · 市场有风险，交易需谨慎
</div>

<script>
// ============================================================
// Config
// ============================================================
const BACKEND_URL = 'https://crypto-signal-0ydo.onrender.com';
const COIN_ORDER = ['BTC', 'ETH', 'BNB', 'SOL'];
const COIN_NAMES = { BTC: 'Bitcoin', ETH: 'Ethereum', BNB: 'Binance Coin', SOL: 'Solana' };

// 各币种 SVG Logo — 使用实际币种标识而非首字母
const COIN_LOGOS = {
  BTC: '<svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="19" fill="#F7931A"/><path d="M26 15.5c0 2.5-1.5 2.5-4 3l.5 2h-2l-.5-2H18l.5 2h-2l-.5-2c-1 0-3-.5-3-2.5 0-1.5 1-1.5 2-1.5 1 0 2 .5 3 .5V12.5c-1 0-2-.5-3-.5-1 0-2.5-.5-2.5-2s1.5-2.5 3-2.5L14 5h2l-.5 2h2l.5-2h2l-.5 2c2 0 4 .5 4 3 0 1.5-1 2.5-2.5 2.5.5.5 2.5 1 2.5 3zm-6 .5c0-.5-.5-1-1.5-1V16c1 0 1.5-.5 1.5 0zm-1.5-4c-1.5 0-2 .5-2 1.5 0 .5.5 1 1.5 1V12z" fill="white"/></svg>',
  ETH: '<svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="19" fill="#627EEA"/><path d="M20 6l10 14-10 5-10-5z" fill="white" opacity="0.6"/><path d="M20 6l-10 14 10 5V6z" fill="white"/><path d="M20 25l10-5-10 9V25z" fill="white" opacity="0.4"/></svg>',
  BNB: '<svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="19" fill="#F3BA2F"/><polygon points="20,7 27,20 20,33 13,20" fill="white" opacity="0.92"/><polygon points="20,7 27,20 13,20" fill="#F3BA2F"/><polygon points="20,33 27,20 13,20" fill="#F3BA2F" opacity="0.65"/></svg>',
  SOL: '<svg viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="19" fill="#9945FF"/><path d="M0 40L40 0v40z" fill="#14F195" opacity="0.28"/><path d="M10 13h18l-1.5 3.5H12L10 13z" fill="white" opacity="0.9"/><path d="M10 19.5h18l-1.5 3.5H12l-2-3.5z" fill="white" opacity="0.6"/><path d="M11 26h16l-2 3.5H12l-1-3.5z" fill="white" opacity="0.35"/></svg>',
};

let COUNTDOWN = 60;
let countdownTimer = null;
let lastApiSuccess = false;

// ============================================================
// Gauge helper
// ============================================================
function gaugeColor(score) {
  if (score >= 75) return 'var(--green)';
  if (score >= 61) return '#66bb6a';
  if (score >= 41) return 'var(--text-dim)';
  if (score >= 26) return '#ff9800';
  return 'var(--red)';
}

function directionLabel(score) {
  if (score >= 75) return ['做多', 'long'];
  if (score >= 61) return ['偏多', 'long'];
  if (score >= 41) return ['观望', 'wait'];
  if (score >= 26) return ['偏空', 'short'];
  return ['做空', 'short'];
}

// ============================================================
// Render
function renderCard(data) {
  const { price, score, direction, levels, rsi, macd_hist, ema9, ema21, atr, changes, bb_upper, bb_mid, bb_lower } = data;
  const [dirLabel, dirClass] = directionLabel(score);
  const circumference = 2 * Math.PI * 31;
  const offset = circumference * (1 - score / 100);

  const ch24h = changes?.['24h'] || 0;
  const ch7d = changes?.['7d'] || 0;
  const decimals = data.sym === 'BNB' || data.sym === 'SOL' ? 2 : 0;

  return `
    <div class="coin-card ${dirClass}">
      <div class="card-header">
        <div class="coin-name">
          <div class="coin-icon">${COIN_LOGOS[data.sym]}</div>
          <div>
            <div class="coin-symbol">${data.sym} <span style="color:var(--text-muted);font-size:12px;font-weight:500">${COIN_NAMES[data.sym]}</span></div>
            <div class="coin-price">${'$' + price.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}</div>
          </div>
        </div>
        <div class="signal-badge ${dirClass}">${dirLabel}</div>
      </div>

      <div class="score-section">
        <div class="gauge">
          <svg class="gauge-svg" viewBox="0 0 76 76" width="76" height="76">
            <circle class="gauge-bg" cx="38" cy="38" r="31"/>
            <circle class="gauge-fill" cx="38" cy="38" r="31"
              stroke="${gaugeColor(score)}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="gauge-text">
            <div class="gauge-value" style="color:${gaugeColor(score)}">${score}</div>
            <div class="gauge-label">/ 100</div>
          </div>
        </div>
        <div class="score-meta">
          <div>24h <strong style="color:${ch24h >= 0 ? 'var(--green)' : 'var(--red)'}">${ch24h >= 0 ? '+' : ''}${ch24h.toFixed(2)}%</strong></div>
          <div>7d  <strong style="color:${ch7d >= 0 ? 'var(--green)' : 'var(--red)'}">${ch7d >= 0 ? '+' : ''}${ch7d.toFixed(2)}%</strong></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:3px">RSI ${rsi?.toFixed(1) || '--'} · MACD ${macd_hist?.toFixed(4) || '--'}</div>
        </div>
      </div>

      <div class="indicators">
        <div class="indicator"><span class="label">EMA(9)</span><span class="value">${'$' + (ema9?.toLocaleString() || '--')}</span></div>
        <div class="indicator"><span class="label">EMA(21)</span><span class="value">${'$' + (ema21?.toLocaleString() || '--')}</span></div>
        <div class="indicator"><span class="label">ATR(14)</span><span class="value">${'$' + (atr?.toFixed(2) || '--')}</span></div>
        <div class="indicator"><span class="label">布林宽度</span><span class="value">${((bb_upper - bb_lower) / bb_mid * 100)?.toFixed(1) || '--'}%</span></div>
      </div>

      <div class="levels">
        <div class="level-item entry"><span class="lbl">入场</span><span class="val">${levels?.entry_zone || '—'}</span></div>
        <div class="level-item sl"><span class="lbl">止损</span><span class="val">${levels?.stop_loss || '—'}</span></div>
        <div class="level-item tp"><span class="lbl">止盈 1</span><span class="val">${levels?.take_profit_1 || '—'}</span></div>
        <div class="level-item tp"><span class="lbl">止盈 2</span><span class="val">${levels?.take_profit_2 || '—'}</span></div>
      </div>
    </div>
  `;
}

function renderHistory(history) {
  if (!history || history.length === 0) {
    return `<div class="empty-state">
      <div class="icon">📭</div>
      <div class="msg">暂无信号记录</div>
      <div class="hint">当评分突破 ≥75 或 ≤25 时自动记录</div>
    </div>`;
  }

  return history.slice(0, 20).map(h => {
    const time = new Date(h.time);
    const timeStr = time.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const dirClass = h.direction === '做多' ? 'long' : 'short';
    const dirEmoji = h.direction === '做多' ? '🟢' : '🔴';
    const chStr = h.channels?.length ? h.channels.join('+') : '—';
    return `
      <div class="history-item">
        <span class="history-time">${timeStr}</span>
        <span class="history-sym">${h.symbol}</span>
        <span class="history-dir ${dirClass}">${dirEmoji} ${h.direction}</span>
        <span class="history-score">${h.score}/100</span>
        <span class="history-price">${'$' + (h.price?.toLocaleString() || '--')}</span>
        <span class="history-ch">${chStr}</span>
      </div>
    `;
  }).join('');
}

// ============================================================
// Data Fetching
// ============================================================
async function fetchData() {
  try {
    const apiBase = BACKEND_URL || '';
    const resp = await fetch(apiBase + '/api/status');
    const data = await resp.json();

    lastApiSuccess = true;
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    if (data.status === 'fetching') {
      statusDot.className = 'status-dot';
      statusText.textContent = '正在拉取数据…';
    } else if (data.status === 'running' || data.status === 'synced') {
      statusDot.className = 'status-dot';
      statusText.textContent = '引擎运行中';
    } else {
      statusDot.className = 'status-dot error';
      statusText.textContent = data.status || '未知状态';
    }

    const grid = document.getElementById('cardGrid');
    const cards = COIN_ORDER.map(sym => {
      const r = data.results?.[sym];
      if (!r) {
        return renderLoadingCard(sym);
      }
      return renderCard({ ...r, sym });
    }).join('');

    grid.innerHTML = cards || renderPlaceholder();
    document.getElementById('historyList').innerHTML = renderHistory(data.history);
    COUNTDOWN = (data.config?.poll_interval || 60);
  } catch (e) {
    if (lastApiSuccess) {
      document.getElementById('statusText').textContent = '后端断连，数据可能过时';
      document.getElementById('statusDot').className = 'status-dot error';
    } else {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('statusText').textContent = '等待后端部署';
      document.getElementById('cardGrid').innerHTML = renderPlaceholder();
    }
  }
}

function renderLoadingCard(sym) {
  return `
    <div class="coin-card wait" style="display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;text-align:center">
      <div class="coin-icon" style="width:48px;height:48px;opacity:0.4">${COIN_LOGOS[sym]}</div>
      <div style="color:var(--text-dim);font-size:15px;font-weight:700;margin-top:14px">${sym}</div>
      <div style="color:var(--text-muted);font-size:13px;margin-top:4px">数据加载中，请稍候…</div>
    </div>
  `;
}

function renderPlaceholder() {
  return COIN_ORDER.map(sym => `
    <div class="coin-card wait" style="display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;text-align:center">
      <div class="coin-icon" style="width:48px;height:48px;opacity:0.3">${COIN_LOGOS[sym]}</div>
      <div style="color:var(--text-dim);font-size:15px;font-weight:700;margin-top:16px">${sym} — 等待数据</div>
      <div style="color:var(--text-muted);font-size:13px;margin-top:6px;max-width:240px">后端引擎尚未部署。请参考部署指南将 Flask 服务部署到 Render.com</div>
    </div>
  `).join('');
}

// ============================================================
// Countdown Timer
// ============================================================
function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    COUNTDOWN--;
    document.getElementById('countdown').textContent = COUNTDOWN > 0 ? COUNTDOWN + 's 后刷新' : '';
    if (COUNTDOWN <= 0) {
      COUNTDOWN = 60;
      fetchData();
    }
  }, 1000);
}

// ============================================================
// Init
// ============================================================
fetchData();
startCountdown();
</script>
</body>
</html>
