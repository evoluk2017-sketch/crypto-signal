<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CryptoSignal — 智能合约信号系统</title>
<style>
/* ============================================================
   CryptoSignal Dashboard — Dark Premium Terminal v3.0
   ============================================================ */
:root {
  --bg: #070b14;
  --bg-card: rgba(12, 18, 34, 0.88);
  --bg-card-hover: rgba(18, 26, 46, 0.94);
  --border: rgba(255, 255, 255, 0.07);
  --border-hover: rgba(255, 255, 255, 0.14);
  --text: #eaedf4;
  --text-dim: #9aa2b7;
  --text-muted: #5c667b;
  --green: #00d49f;
  --green-bg: rgba(0, 212, 159, 0.12);
  --red: #ff4965;
  --red-bg: rgba(255, 73, 101, 0.12);
  --yellow: #f5a623;
  --blue: #5b9cf5;
  --purple: #8b6cf5;
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', 'Menlo', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background-image:
    radial-gradient(ellipse 800px 600px at 10% 10%, rgba(0, 212, 159, 0.03) 0%, transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 70%, rgba(91, 156, 245, 0.03) 0%, transparent 60%),
    radial-gradient(ellipse 600px 700px at 50% 30%, rgba(139, 108, 245, 0.02) 0%, transparent 50%);
}

/* ============ Header ============ */
.header {
  padding: 32px 32px 0;
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 20px;
}
.header-left h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.header-left .subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 6px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px rgba(0, 212, 159, 0.5);
  animation: dotPulse 2s infinite;
}
.status-dot.warn { background: var(--yellow); box-shadow: 0 0 10px rgba(245, 166, 35, 0.5); }
.status-dot.error { background: var(--red); box-shadow: 0 0 10px rgba(255, 73, 101, 0.5); }
@keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.status-pill .time {
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
}

/* ============ Dashboard ============ */
.dashboard {
  max-width: 1440px;
  margin: 28px auto;
  padding: 0 32px 56px;
}

/* ============ Coin Cards Grid ============ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 22px;
  margin-bottom: 32px;
}

@media (max-width: 768px) {
  .card-grid { grid-template-columns: 1fr; }
  .header { padding: 20px 16px 0; }
  .header-left h1 { font-size: 24px; }
  .dashboard { padding: 18px 12px 42px; }
}

/* ============ Card ============ */
.coin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px;
  position: relative;
  overflow: hidden;
  transition: all 0.35s ease;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
}
.coin-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

/* Direction accent line */
.coin-card::before {
  content: '';
  position: absolute; top: 0; left: 12px; right: 12px;
  height: 2px;
  border-radius: 0 0 3px 3px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.coin-card.long::before  { background: var(--green); opacity: 1; box-shadow: 0 0 12px rgba(0, 212, 159, 0.4); }
.coin-card.short::before { background: var(--red);   opacity: 1; box-shadow: 0 0 12px rgba(255, 73, 101, 0.4); }
.coin-card.wait::before  { background: var(--text-muted); opacity: 0.5; }

/* ============ Card Header (Logo + Info + Badge) ============ */
.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
}
.coin-identity {
  display: flex;
  align-items: center;
  gap: 14px;
}
.coin-logo-wrap {
  width: 44px; height: 44px;
  flex-shrink: 0;
  border-radius: 50%;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}
.coin-logo-wrap img {
  width: 32px; height: 32px;
  object-fit: contain;
  display: block;
}
/* ETH classic blue-purple background */
.coin-logo-wrap.eth-logo {
  background: linear-gradient(135deg, #627eea 0%, #8b6cf5 100%) !important;
  border: 1px solid rgba(98, 126, 234, 0.35);
  box-shadow: 0 0 16px rgba(98, 126, 234, 0.2);
}
.coin-info .symbol {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 0.2px;
  line-height: 1;
}
.coin-info .name {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 3px;
}
.price-area {
  text-align: right;
  line-height: 1.1;
}
.price-main {
  font-size: 26px;
  font-weight: 800;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.8px;
}
.price-change-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 5px;
  margin-top: 6px;
}
.price-change-pill.up   { color: var(--green); background: var(--green-bg); }
.price-change-pill.down { color: var(--red);   background: var(--red-bg); }
.price-change-pill .arrow { font-size: 10px; }

/* Signal badge */
.signal-badge {
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.signal-badge.long  { background: var(--green-bg); color: var(--green);
  box-shadow: 0 0 18px rgba(0, 212, 159, 0.12); }
.signal-badge.short { background: var(--red-bg);   color: var(--red);
  box-shadow: 0 0 18px rgba(255, 73, 101, 0.12); }
.signal-badge.wait  { background: rgba(255, 255, 255, 0.05); color: var(--text-dim); }

/* ============ Gauge Section ============ */
.gauge-section {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 16px 0;
  margin: 10px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.gauge-ring {
  width: 88px; height: 88px;
  position: relative;
  flex-shrink: 0;
}
.gauge-ring svg { display: block; transform: rotate(-90deg); }
.gauge-ring .center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.gauge-ring .score-val { font-size: 26px; font-weight: 800; line-height: 1; }
.gauge-ring .score-max { font-size: 10px; color: var(--text-dim); font-weight: 600; margin-top: 2px; }
.gauge-stats {
  display: flex;
  flex-direction: column;
  gap: 7px;
  font-size: 13px;
}
.gauge-stat {
  display: flex;
  align-items: center;
  gap: 8px;
}
.gauge-stat .stat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.gauge-stat .stat-dot.pos { background: var(--green); }
.gauge-stat .stat-dot.neg { background: var(--red); }
.gauge-stat .stat-label { color: var(--text-dim); min-width: 28px; font-weight: 500; }
.gauge-stat .stat-value { font-weight: 700; color: var(--text); font-feature-settings: "tnum"; }

/* ============ Indicator Bars ============ */
.indicators-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.indicator-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.ind-label {
  width: 68px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  flex-shrink: 0;
  text-align: right;
  letter-spacing: 0.3px;
}
.ind-bar-bg {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: rgba(255, 255, 255, 0.05);
  position: relative;
  overflow: hidden;
}
.ind-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease, background 0.5s ease;
}
.ind-value {
  width: 64px;
  font-size: 12px;
  font-weight: 700;
  text-align: right;
  flex-shrink: 0;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
  font-family: var(--font-mono);
}

/* RSI gradient */
.ind-bar-fill.rsi-overbought   { background: var(--red); }
.ind-bar-fill.rsi-bullish      { background: linear-gradient(90deg, var(--green), #66d9a0); }
.ind-bar-fill.rsi-neutral      { background: linear-gradient(90deg, var(--yellow), var(--text-dim)); }
.ind-bar-fill.rsi-bearish      { background: linear-gradient(90deg, #e89050, var(--red)); }
.ind-bar-fill.rsi-oversold     { background: var(--red); }

/* MACD bar */
.ind-bar-fill.macd-pos { background: var(--green); }
.ind-bar-fill.macd-neg { background: var(--red); }

/* EMA alignment */
.ind-bar-fill.ema-bullish { background: var(--green); }
.ind-bar-fill.ema-bearish { background: var(--red); }

/* ATR */
.ind-bar-fill.atr-normal  { background: linear-gradient(90deg, var(--blue), var(--purple)); }

/* BB width */
.ind-bar-fill.bb-tight    { background: var(--text-dim); }
.ind-bar-fill.bb-normal   { background: linear-gradient(90deg, var(--blue), var(--purple)); }
.ind-bar-fill.bb-wide     { background: var(--yellow); }

/* ============ Trading Levels ============ */
.levels-section {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  padding-top: 14px;
}
.level-box {
  text-align: center;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.04);
}
.level-box .lvl-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.level-box .lvl-value {
  font-size: 12px;
  font-weight: 800;
  font-family: var(--font-mono);
  font-feature-settings: "tnum";
}
.level-box.entry .lvl-label  { color: var(--blue); }
.level-box.entry .lvl-value  { color: var(--blue); }
.level-box.sl .lvl-label     { color: var(--red); }
.level-box.sl .lvl-value     { color: var(--red); }
.level-box.tp1 .lvl-label    { color: var(--green); }
.level-box.tp1 .lvl-value    { color: var(--green); }
.level-box.tp2 .lvl-label    { color: var(--green); }
.level-box.tp2 .lvl-value    { color: var(--green); }

/* ============ History ============ */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.section-header .bar {
  width: 4px; height: 20px;
  background: var(--green);
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(0, 212, 159, 0.4);
}
.section-header span {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.history-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}

.history-list { max-height: 360px; overflow-y: auto; }
.history-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.history-item:last-child { border-bottom: none; }
.history-time  { color: var(--text-muted); font-size: 12px; width: 56px; flex-shrink: 0; font-feature-settings: "tnum"; }
.history-sym   { font-weight: 800; width: 42px; flex-shrink: 0; font-size: 14px; }
.history-dir   { padding: 4px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; }
.history-dir.long  { background: var(--green-bg); color: var(--green); }
.history-dir.short { background: var(--red-bg);   color: var(--red); }
.history-score { font-weight: 800; width: 52px; text-align: right; flex-shrink: 0; font-size: 14px; }
.history-price { color: var(--text-dim); flex-shrink: 0; font-size: 13px; font-feature-settings: "tnum"; }
.history-ch    { font-size: 11px; color: var(--text-muted); margin-left: auto; }

/* ============ Market Indicators (4 cards) ============ */
.indicator-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}
.indicator-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.indicator-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}
.ind-card-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.ind-card-value {
  font-size: 30px;
  font-weight: 900;
  line-height: 1;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
}
.ind-card-desc {
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
}
.ind-card-bar {
  height: 5px;
  border-radius: 3px;
  margin-top: 10px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
}
.ind-card-bar-fill {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  border-radius: 3px;
  transition: width 0.8s ease;
}

/* ============ Daily Events ============ */
.events-section {
  margin-bottom: 22px;
}
.events-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.event-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: all 0.25s ease;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.event-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateX(4px);
}
.event-num {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(91,156,245,0.15);
  color: var(--blue);
  font-size: 13px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
}
.event-content { flex: 1; min-width: 0; }
.event-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  line-height: 1.4;
}
.event-title:hover { color: var(--green); }
.event-summary {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.5;
}

@media (max-width: 768px) {
  .indicator-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .indicator-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .ind-card-value { font-size: 24px; }
  .event-item { padding: 12px 14px; }
}

.empty-state {
  text-align: center;
  padding: 52px 24px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 44px; margin-bottom: 16px; opacity: 0.35; }
.empty-state .msg  { font-size: 15px; font-weight: 500; }
.empty-state .hint { font-size: 12px; margin-top: 8px; }

/* ============ Footer ============ */
.footer {
  text-align: center;
  padding: 32px;
  color: var(--text-muted);
  font-size: 12px;
  letter-spacing: 0.2px;
}
.footer a { color: var(--text-dim); text-decoration: none; font-weight: 600; }
.footer a:hover { color: var(--green); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* Animations */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.coin-card { animation: cardIn 0.5s ease both; }
.coin-card:nth-child(1) { animation-delay: 0s; }
.coin-card:nth-child(2) { animation-delay: 0.05s; }
.coin-card:nth-child(3) { animation-delay: 0.10s; }
.coin-card:nth-child(4) { animation-delay: 0.15s; }
.coin-card:nth-child(5) { animation-delay: 0.20s; }
.coin-card:nth-child(6) { animation-delay: 0.25s; }
.coin-card:nth-child(7) { animation-delay: 0.30s; }
.coin-card:nth-child(8) { animation-delay: 0.35s; }
.coin-card:nth-child(9) { animation-delay: 0.40s; }

/* Mobile */
@media (max-width: 480px) {
  .coin-card { padding: 20px; }
  .gauge-ring { width: 72px; height: 72px; }
  .gauge-ring .score-val { font-size: 22px; }
  .price-main { font-size: 22px; }
  .coin-logo-wrap { width: 38px; height: 38px; }
  .coin-logo-wrap img { width: 28px; height: 28px; }
  .ind-label { width: 52px; font-size: 11px; }
  .ind-value { width: 52px; font-size: 11px; }
  .levels-section { grid-template-columns: 1fr 1fr; }
  .gauge-section { gap: 12px; }
  .signal-badge { font-size: 12px; padding: 5px 14px; }
}

/* ============ Promo Banner ============ */
.promo-banner {
  max-width: 1440px;
  margin: 20px auto 0;
  padding: 0 32px;
}
.promo-banner-inner {
  background: linear-gradient(135deg, rgba(0, 212, 159, 0.08) 0%, rgba(91, 156, 245, 0.08) 50%, rgba(139, 108, 245, 0.06) 100%);
  border: 1px solid rgba(0, 212, 159, 0.18);
  border-radius: var(--radius);
  padding: 16px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px 32px;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.promo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
}
.promo-item .promo-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.promo-item.aster .promo-icon { background: rgba(0, 212, 159, 0.15); }
.promo-item.binance .promo-icon { background: rgba(243, 186, 47, 0.15); }
.promo-text { color: var(--text); line-height: 1.5; }
.promo-text .highlight { color: var(--green); font-weight: 700; }
.promo-text .highlight2 { color: #f3ba2f; font-weight: 700; }
.promo-link {
  color: var(--blue);
  text-decoration: none;
  font-weight: 700;
  font-size: 12px;
  word-break: break-all;
  transition: color 0.2s;
}
.promo-link:hover { color: var(--green); }
.promo-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  background: rgba(255, 73, 101, 0.15);
  color: var(--red);
  margin-left: 4px;
}
@media (max-width: 768px) {

<script>
// ============================================================
// Config
// ============================================================
const BACKEND_URL = 'https://crypto-signal-0ydo.onrender.com';
const COIN_ORDER = ['BTC', 'ETH', 'BNB', 'SOL', 'ZEC', 'TRX', 'TAO', 'DOGE', 'XRP'];
const COIN_NAMES = {
  BTC: 'Bitcoin', ETH: 'Ethereum', BNB: 'Binance Coin', SOL: 'Solana',
  ZEC: 'Zcash', TRX: 'TRON', TAO: 'Bittensor', DOGE: 'Dogecoin', XRP: 'XRP'
};
const COIN_DECIMALS = { BTC: 0, ETH: 0, BNB: 2, SOL: 2, ZEC: 2, TRX: 4, TAO: 2, DOGE: 4, XRP: 4 };

// Official logos (cryptologos.cc + CoinGecko fallback)
const COIN_LOGOS = {
  BTC: 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg',
  ETH: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg',
  BNB: 'https://cryptologos.cc/logos/bnb-bnb-logo.svg',
  SOL: 'https://cryptologos.cc/logos/solana-sol-logo.svg',
  ZEC: 'https://cryptologos.cc/logos/zcash-zec-logo.svg',
  TRX: 'https://cryptologos.cc/logos/tron-trx-logo.svg',
  TAO: 'https://coin-images.coingecko.com/coins/images/28452/large/ARUsPeNQ_400x400.jpeg?1696527447',
  DOGE: 'https://cryptologos.cc/logos/dogecoin-doge-logo.svg',
  XRP: 'https://cryptologos.cc/logos/xrp-xrp-logo.svg',
};

let COUNTDOWN = 60;
let countdownTimer = null;
let lastApiSuccess = false;

// ============================================================
// Helpers
// ============================================================
function scoreColor(score) {
  if (score >= 75) return 'var(--green)';
  if (score >= 61) return '#53d89e';
  if (score >= 41) return 'var(--text-dim)';
  if (score >= 26) return '#f0a050';
  return 'var(--red)';
}

function directionInfo(score) {
  if (score >= 75) return ['做多', 'long'];
  if (score >= 61) return ['偏多', 'long'];
  if (score >= 41) return ['观望', 'wait'];
  if (score >= 26) return ['偏空', 'short'];
  return ['做空', 'short'];
}

function priceFmt(val, dec) {
  return val.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// RSI horizontal bar (0–100 mapped to 0–100% width)
function rsiBarClass(rsiVal) {
  if (rsiVal >= 75) return 'rsi-overbought';
  if (rsiVal >= 60) return 'rsi-bullish';
  if (rsiVal >= 40) return 'rsi-neutral';
  if (rsiVal >= 25) return 'rsi-bearish';
  return 'rsi-oversold';
}

// MACD histogram bar: show relative size, capped at 100px equivalent
function macdBarInfo(hist, price) {
  if (!price || price <= 0) return { width: 0, cls: 'macd-pos' };
  const pct = Math.abs(hist) / price * 100;
  const w = Math.min(pct * 300, 100); // scale to 0–100%
  return { width: w, cls: hist >= 0 ? 'macd-pos' : 'macd-neg' };
}

// EMA alignment bar
function emaBarInfo(ema9, ema21) {
  if (!ema9 || !ema21 || ema21 === 0) return { width: 0, cls: '' };
  const gap = (ema9 - ema21) / ema21 * 100; // %
  const w = Math.min(Math.abs(gap) * 20, 100);
  return { width: w, cls: gap > 0 ? 'ema-bullish' : 'ema-bearish' };
}

// ATR volatility bar
function atrBarInfo(atrVal, price) {
  if (!price || price <= 0) return { width: 0, cls: '' };
  const pct = atrVal / price * 100;
  const w = Math.min(pct * 20, 100);
  return { width: w, cls: 'atr-normal' };
}

// Bollinger Band width bar
function bbBarInfo(upper, mid, lower) {
  if (!mid || mid <= 0) return { width: 0, cls: '' };
  const width = (upper - lower) / mid * 100;
  const w = Math.min(width * 15, 100);
  let cls = 'bb-normal';
  if (width < 3) cls = 'bb-tight';
  else if (width > 12) cls = 'bb-wide';
  return { width: w, cls };
}

// ============================================================
// Render: Coin Card
// ============================================================
function renderCard(data) {
  const s = data;
  const dec = COIN_DECIMALS[s.sym] || 2;
  const [dirLabel, dirClass] = directionInfo(s.score);
  const ch24h = s.changes?.['24h'] || 0;
  const ch7d  = s.changes?.['7d']  || 0;

  // Gauge
  const circum = 2 * Math.PI * 32;
  const offset  = circum * (1 - s.score / 100);

  // Indicator bars
  const rsiV   = s.rsi || 50;
  const macdH  = s.macd_hist || 0;
  const ema9V  = s.ema9 || 0;
  const ema21V = s.ema21 || 0;
  const atrV   = s.atr || 0;
  const bbU    = s.bb_upper || 0;
  const bbM    = s.bb_mid || 0;
  const bbL    = s.bb_lower || 0;

  const rsiB  = rsiBarClass(rsiV);
  const macdB = macdBarInfo(macdH, s.price);
  const emaB  = emaBarInfo(ema9V, ema21V);
  const atrB  = atrBarInfo(atrV, s.price);
  const bbB   = bbBarInfo(bbU, bbM, bbL);

  const ch24hClass = ch24h >= 0 ? 'up' : 'down';

  return `
    <div class="coin-card ${dirClass}">

          <div class="coin-logo-wrap${s.sym === 'ETH' ? ' eth-logo' : ''}">
            <img src="${COIN_LOGOS[s.sym]}" alt="${s.sym}" onerror="this.style.display='none';this.parentElement.textContent='${s.sym.charAt(0)}';this.parentElement.style.fontWeight='800';this.parentElement.style.fontSize='18px';this.parentElement.style.color='var(--text)';">
          </div>
          <div class="coin-info">
            <div class="symbol">${s.sym}</div>
            <div class="name">${COIN_NAMES[s.sym]}</div>
          </div>
        </div>
        <div class="price-area">
          <div class="price-main">$${priceFmt(s.price, dec)}</div>
          <div class="price-change-pill ${ch24hClass}">
            <span class="arrow">${ch24hArrow}</span> ${Math.abs(ch24h).toFixed(2)}%
          </div>
        </div>
      </div>

      <!-- Signal Badge -->
      <div class="signal-badge ${dirClass}">${dirLabel} · ${s.score}/100</div>

      <!-- Gauge + Quick Stats -->
      <div class="gauge-section">
        <div class="gauge-ring">
          <svg viewBox="0 0 76 76" width="76" height="76">
            <circle cx="38" cy="38" r="32" fill="none"
              stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
            <circle cx="38" cy="38" r="32" fill="none"
              stroke="${scoreColor(s.score)}" stroke-width="5" stroke-linecap="round"
              stroke-dasharray="${circum}" stroke-dashoffset="${offset}"
              style="filter: drop-shadow(0 0 6px ${scoreColor(s.score)}40);"/>
          </svg>
          <div class="center">
            <div class="score-val" style="color:${scoreColor(s.score)}">${s.score}</div>
            <div class="score-max">/ 100</div>
          </div>
        </div>
        <div class="gauge-stats">
          <div class="gauge-stat">
            <div class="stat-dot ${ch7d >= 0 ? 'pos' : 'neg'}"></div>
            <span class="stat-label">7日</span>
            <span class="stat-value" style="color:${ch7d >= 0 ? 'var(--green)' : 'var(--red)'}">
              ${ch7d >= 0 ? '+' : ''}${ch7d.toFixed(2)}%
            </span>
          </div>
          <div class="gauge-stat">
            <div class="stat-dot pos" style="visibility:hidden"></div>
            <span class="stat-label">EMA</span>
            <span class="stat-value">
              <span style="color:var(--blue)">${ema9V > 0 ? '$' + priceFmt(ema9V, dec) : '--'}</span>
              <span style="color:var(--text-muted);font-weight:500"> / </span>
              <span style="color:var(--purple)">${ema21V > 0 ? '$' + priceFmt(ema21V, dec) : '--'}</span>
            </span>
          </div>
        </div>
      </div>

      <!-- Indicator Bars -->
      <div class="indicators-section">
        <div class="indicator-row">
          <div class="ind-label">RSI</div>
          <div class="ind-bar-bg">
            <div class="ind-bar-fill ${rsiB}" style="width:${rsiV}%"></div>
          </div>
          <div class="ind-value" style="color:${rsiV >= 70 ? 'var(--red)' : rsiV >= 60 ? 'var(--green)' : rsiV <= 30 ? 'var(--red)' : 'var(--text-dim)'}">${rsiV.toFixed(1)}</div>
        </div>
        <div class="indicator-row">
          <div class="ind-label">MACD</div>
          <div class="ind-bar-bg" style="position:relative">
            <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.1)"></div>
            <div class="ind-bar-fill ${macdB.cls}" style="width:${macdB.width}%;margin-left:${macdH < 0 ? (50 - macdB.width) : 50}%"></div>
          </div>
          <div class="ind-value" style="color:${macdH >= 0 ? 'var(--green)' : 'var(--red)'}">${macdH.toFixed(4)}</div>
        </div>
        <div class="indicator-row">
          <div class="ind-label">EMA对齐</div>
          <div class="ind-bar-bg">
            <div class="ind-bar-fill ${emaB.cls}" style="width:${emaB.width}%"></div>
          </div>
          <div class="ind-value" style="color:${ema9V > ema21V ? 'var(--green)' : 'var(--red)'}">
            ${ema9V > 0 && ema21V > 0 ? (ema9V > ema21V ? '多头排列' : '空头排列') : '--'}
          </div>
        </div>
        <div class="indicator-row">
          <div class="ind-label">ATR</div>
          <div class="ind-bar-bg">
            <div class="ind-bar-fill ${atrB.cls}" style="width:${atrB.width}%"></div>
          </div>
          <div class="ind-value" style="color:var(--blue)">$${atrV.toFixed(2)}</div>
        </div>
        <div class="indicator-row">
          <div class="ind-label">布林带宽</div>
          <div class="ind-bar-bg">
            <div class="ind-bar-fill ${bbB.cls}" style="width:${bbB.width}%"></div>
          </div>
          <div class="ind-value" style="color:${bbB.cls === 'bb-wide' ? 'var(--yellow)' : 'var(--text-dim)'}">
            ${bbM > 0 ? ((bbU - bbL) / bbM * 100).toFixed(1) : '--'}%
          </div>
        </div>
      </div>

      <!-- Trading Levels -->
      <div class="levels-section">
        <div class="level-box entry">
          <div class="lvl-label">入场</div>
          <div class="lvl-value">${s.levels?.entry_zone || '—'}</div>
        </div>
        <div class="level-box sl">
          <div class="lvl-label">止损</div>
          <div class="lvl-value">${s.levels?.stop_loss || '—'}</div>
        </div>
        <div class="level-box tp1">
          <div class="lvl-label">止盈 1</div>
          <div class="lvl-value">${s.levels?.take_profit_1 || '—'}</div>
        </div>
        <div class="level-box tp2">
          <div class="lvl-label">止盈 2</div>
          <div class="lvl-value">${s.levels?.take_profit_2 || '—'}</div>
        </div>
      </div>
    </div>
  `;
}

function renderLoadingCard(sym) {
  return `
    <div class="coin-card wait" style="display:flex;align-items:center;justify-content:center;min-height:380px;flex-direction:column;text-align:center">
      <div class="coin-logo-wrap${sym === 'ETH' ? ' eth-logo' : ''}" style="width:52px;height:52px;margin-bottom:14px">
        <img src="${COIN_LOGOS[sym]}" alt="${sym}" style="width:38px;height:38px;opacity:0.35" onerror="this.style.display='none';this.parentElement.textContent='${sym.charAt(0)}';this.parentElement.style.fontWeight='800';this.parentElement.style.fontSize='20px';this.parentElement.style.color='rgba(255,255,255,0.65)'">

      <div style="color:var(--text-muted);font-size:13px;margin-top:6px">数据加载中，请稍候…</div>

}

// ============================================================
// Render: Market Indicators (4 cards)
// ============================================================
function renderIndicators(ind) {
  const grid = document.getElementById('indicatorGrid');
  if (!ind) { grid.innerHTML = ''; return; }

  // 1. Fear & Greed
  const fng = ind.fear_greed || {};
  const fngV = fng.current?.value;
  const fngC = fng.current?.classification || '\u2014';
  const fngColor = fngV == null ? 'var(--text-muted)' :
    fngV <= 25 ? 'var(--red)' : fngV <= 45 ? '#f5a623' :
    fngV <= 55 ? '#ffd93d' : fngV <= 75 ? '#53d89e' : 'var(--green)';

  // 2. Bull/Bear
  const bb = ind.bull_bear || {};
  const bbL = bb.long;
  const bbS = bb.short;
  const bbColor = bbL == null ? 'var(--text-muted)' :
    bbL >= 58 ? 'var(--green)' : bbL >= 52 ? '#53d89e' :
    bbL >= 48 ? '#ffd93d' : bbL >= 42 ? '#f5a623' : 'var(--red)';

  // 3. BTC Dominance
  const dom = ind.btc_dominance || {};
  const domV = dom.value;
  const domColor = domV == null ? 'var(--text-muted)' :
    domV >= 55 ? '#f5a623' : domV >= 48 ? '#ffd93d' : 'var(--green)';

  // 4. 24h Market Trend
  const mt = ind.market_trend || {};
  const mtV = mt.change_24h;
  const mtColor = mtV == null ? 'var(--text-muted)' :
    mtV >= 3 ? 'var(--green)' : mtV >= 1 ? '#53d89e' :
    mtV >= -1 ? '#ffd93d' : mtV >= -3 ? '#f5a623' : 'var(--red)';
  const mtArrow = mtV == null ? '' : mtV >= 0 ? '\u2191' : '\u2193';

  grid.innerHTML = `
    <div class="indicator-card">
      <div class="ind-card-label">恐慌贪婪指数</div>
      <div class="ind-card-value" style="color:${fngColor}">${fngV ?? '--'}</div>
      <div class="ind-card-desc" style="color:${fngColor}">${fngC}</div>
      <div class="ind-card-bar"><div class="ind-card-bar-fill" style="width:${fngV ?? 0}%;background:${fngColor}"></div></div>
    </div>
    <div class="indicator-card">
      <div class="ind-card-label">牛熊多空比</div>
      <div class="ind-card-value" style="color:${bbColor}">${bbL != null ? bbL + '%' : '--'}</div>
      <div class="ind-card-desc" style="color:${bbColor}">${bbL != null ? '\u591a ' + bbL + '% / \u7a7a ' + bbS + '%' : '\u2014'}</div>
      <div class="ind-card-bar"><div class="ind-card-bar-fill" style="width:${bbL ?? 0}%;background:${bbColor}"></div></div>
    </div>
    <div class="indicator-card">
      <div class="ind-card-label">BTC\u5e02\u503c\u5360\u6bd4</div>
      <div class="ind-card-value" style="color:${domColor}">${domV != null ? domV + '%' : '--'}</div>
      <div class="ind-card-desc" style="color:var(--text-muted)">${dom.total_mcap_t != null ? '\u603b\u5e02\u503c $' + dom.total_mcap_t + 'T' : '\u2014'}</div>
      <div class="ind-card-bar"><div class="ind-card-bar-fill" style="width:${Math.min((domV ?? 0) * 1.5, 100)}%;background:${domColor}"></div></div>
    </div>
    <div class="indicator-card">
      <div class="ind-card-label">24h\u5e02\u573a\u8d8b\u52bf</div>
      <div class="ind-card-value" style="color:${mtColor}">${mtV != null ? mtArrow + Math.abs(mtV) + '%' : '--'}</div>
      <div class="ind-card-desc" style="color:${mtColor}">${mtV != null ? (mtV >= 0 ? '\u4e0a\u6da8' : '\u4e0b\u8dcc') : '\u2014'}</div>
      <div class="ind-card-bar"><div class="ind-card-bar-fill" style="width:${Math.min(Math.abs(mtV ?? 0) * 15, 100)}%;background:${mtColor}"></div></div>
    </div>
  `;
}

// ============================================================
// Render: Daily Events
// ============================================================
function renderDailyEvents(eventsData) {

        ${e.summary ? `<div class="event-summary">${e.summary}</div>` : ''}

function renderHistory(history) {
  if (!history || history.length === 0) {
    return `<div class="empty-state">
      <div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>
      <div class="msg">暂无信号记录</div>
      <div class="hint">当评分突破 ≥75 或 ≤25 时自动记录</div>
    </div>`;
  }
  return history.slice(0, 20).map(h => {
    const t = new Date(h.time);
    const ts = t.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const dc = h.direction === '做多' ? 'long' : 'short';
    const de = h.direction === '做多' ? '🟢' : '🔴';
    const cs = h.channels?.length ? h.channels.join('+') : '—';
    return `
      <div class="history-item">
        <span class="history-time">${ts}</span>
        <span class="history-sym">${h.symbol}</span>
        <span class="history-dir ${dc}">${de} ${h.direction}</span>
        <span class="history-score">${h.score}/100</span>
        <span class="history-price">$${(h.price || 0).toLocaleString()}</span>
        <span class="history-ch">${cs}</span>
      </div>
    `;
  }).join('');
}

// ============================================================
// Data Fetching
// ============================================================
async function fetchData() {
  try {
    const resp = await fetch(BACKEND_URL + '/api/status');
    const data = await resp.json();

    lastApiSuccess = true;
    const sd = document.getElementById('statusDot');
    const st = document.getElementById('statusText');

    if (data.status === 'fetching') {
      sd.className = 'status-dot warn';
      st.textContent = '拉取数据中…';
    } else if (data.status === 'running' || data.status === 'synced') {
      sd.className = 'status-dot';
      st.textContent = '引擎运行中';
    } else {
      sd.className = 'status-dot error';
      st.textContent = data.status || '未知';
    }

    // Update last update time
    if (data.last_update) {
      const lu = new Date(data.last_update);
      document.getElementById('countdown').textContent =
        lu.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    const grid = document.getElementById('cardGrid');
    const cards = COIN_ORDER.map(sym => {
      const r = data.results?.[sym];
      return r ? renderCard({ ...r, sym }) : renderLoadingCard(sym);
    }).join('');
    grid.innerHTML = cards || renderAllLoading();

    document.getElementById('historyList').innerHTML = renderHistory(data.history);

    // Market Indicators + Daily Events
    renderIndicators(data.market_indicators);
    renderDailyEvents(data.daily_events);

    COUNTDOWN = data.config?.poll_interval || 60;
  } catch (e) {
    if (lastApiSuccess) {
      document.getElementById('statusText').textContent = '后端断连';
      document.getElementById('statusDot').className = 'status-dot error';
    } else {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('statusText').textContent = '等待后端';
      document.getElementById('cardGrid').innerHTML = renderAllLoading();
    }
  }
}

function renderAllLoading() {
  return COIN_ORDER.map(s => renderLoadingCard(s)).join('');
}

// ============================================================
// Countdown
// ============================================================
function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    COUNTDOWN--;
    if (COUNTDOWN <= 0) { COUNTDOWN = 60; fetchData(); }
  }, 1000);
}

// ============================================================
// Init
// ============================================================
fetchData();
startCountdown();
</script>
</body>
</html>
